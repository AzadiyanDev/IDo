<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IDo Calendar Demo</title>
    <link rel="stylesheet" href="../src/ido-calendar.css">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #0b0e14;
        color: #f2f5f8;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 390px);
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 28px;
      }

      .demo-output {
        border: 1px solid #2a3341;
        border-radius: 16px;
        background: #151a22;
        padding: 12px;
        color: #8e9bae;
        font-size: 13px;
        line-height: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IDo Calendar</h1>
      <div id="calendar"></div>
      <div class="demo-output">
        Selected date:
        <strong id="selected-date">-</strong>
      </div>
    </main>

    <script type="module">
      import { mountIDoCalendar } from '../src/ido-calendar.js';

      const output = document.getElementById('selected-date');
      mountIDoCalendar('calendar', {
        calendarType: 'Jalali',
        locale: 'fa',
        accent: '#00e6f6',
        onChange: ({ date }) => {
          output.textContent = date;
        }
      });
    </script>
  </body>
</html>
