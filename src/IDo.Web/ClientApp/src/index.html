<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>IDo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#05070A" />
    <meta name="application-name" content="IDo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="IDo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/ido-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/ido-icon-180.png" />
    <script>
      (() => {
        const key = 'ido.boot.recovered';
        const marked = () => {
          try { return sessionStorage.getItem(key) === '1'; } catch { return true; }
        };
        const mark = () => {
          try { sessionStorage.setItem(key, '1'); } catch {}
        };
        const clearRuntimeCache = async () => {
          const cacheClear = 'caches' in window
            ? caches.keys().then((keys) => Promise.all(keys.map((item) => caches.delete(item))))
            : Promise.resolve();
          const swClear = 'serviceWorker' in navigator
            ? navigator.serviceWorker.getRegistrations().then((items) => Promise.all(items.map((item) => item.unregister())))
            : Promise.resolve();
          await Promise.allSettled([cacheClear, swClear]);
        };

        window.setTimeout(() => {
          const root = document.querySelector('app-root');
          if (!root || root.children.length > 0 || marked()) return;
          mark();
          clearRuntimeCache().finally(() => window.location.reload());
        }, 15000);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
